spring.application.name=teamflow
server.port=8080

# DataSource Configuration
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/taskdb?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:root}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:gill2000}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA/Hibernate Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.open-in-view=false

# JWT Configuration
app.jwt.secret=${JWT_SECRET:teamflow-secret-change-in-production-min-32-characters}
app.jwt.expiration=${JWT_EXPIRATION:86400000}

# Emergency account recovery (set via env in real usage)
app.recovery.key=${RECOVERY_KEY:teamflow-recovery-dev-key}
